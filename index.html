<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国家远景规划与重大项目库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "宋体", sans-serif; background-color: #f5f5f5; }
        .header { background-color: #c41e3a; color: white; text-align: center; padding: 30px 20px; }
        .header h1 { font-size: 32px; letter-spacing: 4px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .nav { background-color: white; border-bottom: 2px solid #c41e3a; display: flex; justify-content: center; gap: 30px; padding: 12px 0; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #333; font-size: 15px; cursor: pointer; }
        .nav a:hover { color: #c41e3a; }
        .search-area { background-color: white; padding: 40px 20px; text-align: center; margin: 20px auto; max-width: 800px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .search-box { display: flex; justify-content: center; gap: 10px; }
        .search-box input { width: 500px; padding: 12px 16px; font-size: 16px; border: 2px solid #ccc; border-radius: 4px; outline: none; }
        .search-box input:focus { border-color: #c41e3a; }
        .search-box button { padding: 12px 30px; font-size: 16px; background-color: #c41e3a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .search-box button:hover { background-color: #a01830; }
        .advanced-btn { display: inline-block; margin-top: 16px; color: #c41e3a; font-size: 14px; cursor: pointer; text-decoration: underline; }
        .result-area { max-width: 800px; margin: 20px auto; background-color: white; padding: 20px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: none; }
        .result-item { padding: 16px 0; border-bottom: 1px solid #eee; }
        .result-item:last-child { border-bottom: none; }
        .result-item h3 { color: #c41e3a; font-size: 18px; margin-bottom: 6px; }
        .result-item .meta { color: #666; font-size: 13px; margin-bottom: 6px; }
        .result-item .summary { color: #333; font-size: 14px; line-height: 1.6; }
        .footer { text-align: center; padding: 30px; color: #999; font-size: 13px; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 30px; border-radius: 8px; width: 90%; max-width: 700px; max-height: 80%; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; color: #999; cursor: pointer; }
        .close-btn:hover { color: #333; }
        .detail-title { font-size: 24px; color: #c41e3a; margin-bottom: 15px; border-bottom: 2px solid #c41e3a; padding-bottom: 10px; }
        .detail-section { margin-bottom: 20px; }
        .detail-section h4 { font-size: 16px; color: #333; margin-bottom: 8px; border-left: 4px solid #c41e3a; padding-left: 10px; }
        .detail-section p { font-size: 14px; color: #555; line-height: 1.8; text-align: justify; }
    </style>
</head>
<body>
    <div class="header">
        <h1>国家远景规划与重大项目库</h1>
        <p>National Planning & Major Projects Database</p>
    </div>
    <div class="nav">
        <a>首页</a><a>在建项目</a><a>远期规划</a><a>轨道交通</a><a>机器人</a><a>新能源</a><a>科技设施</a>
    </div>
    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入项目名称、地域或领域关键词...">
            <button onclick="doSearch()">检 索</button>
        </div>
        <span class="advanced-btn" onclick="toggleFilter()">高级检索</span>
        <div id="filterArea" style="display:none; margin-top:20px; text-align:left;">
            <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
                <div><label>省份：</label><select id="filterProvince"><option value="">全部</option><option>广东</option><option>北京</option><option>上海</option></select></div>
                <div><label>建设状态：</label><select id="filterStatus"><option value="">全部</option><option>在建</option><option>规划/预备</option></select></div>
                <div><label>领域：</label><select id="filterField"><option value="">全部</option><option>轨道交通</option><option>机器人</option><option>新能源</option><option>科技设施</option></select></div>
                <button onclick="doSearch()" style="padding:8px 20px; background:#c41e3a; color:white; border:none; border-radius:4px; cursor:pointer;">筛选</button>
            </div>
        </div>
    </div>
    <div class="result-area" id="resultArea">
        <p style="margin-bottom:16px; color:#666;">共找到 <strong id="resultCount">0</strong> 条结果</p>
        <div id="resultList"></div>
    </div>
    <div class="footer">本库数据均来源于各级政府公开发布文件 · 仅供参考</div>
    <script>
        const projects = [
            {
                name: "人类细胞谱系大科学研究设施",
                province: "广东",
                city: "广州",
                district: "黄埔区",
                status: "在建",
                type: "大科学装置",
                field: "科技设施",
                overview: "人类细胞谱系大科学研究设施是“十四五”期间国家重点布局的重大科技基础设施之一，落户于广州黄埔区生物岛。该设施旨在绘制人类全生命周期、全细胞类型的动态谱系图谱，建成后将成为全球首个跨尺度、多模态的人类细胞谱系研究平台。",
                content: "1. 细胞谱系高通量获取系统：开发自动化、高通量的单细胞测序与空间组学技术平台，实现对人体各组织器官细胞的大规模、高精度图谱绘制。2. 细胞谱系动态追踪系统：利用基因编辑、谱系示踪等技术，在活体或类器官模型中追踪细胞的分化、迁移、衰老与病变过程。3. 细胞谱系计算与建模平台：构建超级计算与人工智能分析系统，整合多组学数据，建立人类细胞谱系的数字孪生模型，实现虚拟推演与预测。4. 临床转化与应用验证中心：将细胞谱系研究成果向疾病早期诊断、精准治疗、药物筛选、再生医学等方向转化。",
                significance: "1. 破解生命密码的基础工程：人体由约37万亿个细胞构成，每个细胞的来源、去向、命运如何决定，至今仍是生命科学的根本难题。该设施将系统回答“细胞从哪里来、到哪里去”这一核心问题。2. 推动医学范式变革：有了完整的细胞谱系图谱，医生可以精确判断疾病起源于哪类细胞的何种异常变化，实现从“对症治疗”到“对因治疗”的跨越，为癌症、心脑血管病、退行性疾病等重大慢性病提供全新诊疗策略。3. 抢占国际生命科学制高点：目前国际上“人类细胞图谱计划”尚未形成完整体系，我国率先建成该装置，将在生命科学大数据、人工智能辅助诊断等前沿领域建立领先优势。4. 带动生物医药产业发展：设施落户广州黄埔，将为粤港澳大湾区生物医药企业提供核心底层数据与验证平台，加速创新药研发、细胞治疗技术突破，支撑千亿级生物医药产业集群。",
                source: "广州市2026年重点建设项目计划",
                link: ""
            }
        ];
        function doSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const fp = document.getElementById('filterProvince').value;
            const fs = document.getElementById('filterStatus').value;
            const ff = document.getElementById('filterField').value;
            let results = projects;
            if (keyword) { results = results.filter(p => p.name.toLowerCase().includes(keyword) || p.city.toLowerCase().includes(keyword) || p.district.toLowerCase().includes(keyword) || p.field.toLowerCase().includes(keyword) || p.province.toLowerCase().includes(keyword) || (p.overview && p.overview.toLowerCase().includes(keyword))); }
            if (fp) { results = results.filter(p => p.province === fp); }
            if (fs) { results = results.filter(p => p.status === fs); }
            if (ff) { results = results.filter(p => p.field === ff); }
            displayResults(results);
        }
        function displayResults(results) {
            const ra = document.getElementById('resultArea');
            const rl = document.getElementById('resultList');
            const rc = document.getElementById('resultCount');
            if (results.length === 0) { ra.style.display = 'block'; rc.textContent = '0'; rl.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">未找到匹配的项目，请尝试其他关键词或条件。</p>'; return; }
            ra.style.display = 'block'; rc.textContent = results.length;
            let html = '';
            results.forEach(p => { html += `<div class="result-item"><h3 style="cursor:pointer;" onclick="openDetail('${p.name.replace(/'/g, "\\'")}')">${p.name}</h3><div class="meta">${p.province} · ${p.city} · ${p.district} | 状态：<span style="color:${p.status==='在建'?'#2e7d32':'#e65100'}">${p.status}</span> | 类型：${p.type} | 领域：${p.field}</div><div class="summary">${p.overview ? p.overview.substring(0, 100) + '...' : ''}</div></div>`; });
            rl.innerHTML = html;
        }
        function openDetail(name) {
            const project = projects.find(p => p.name === name);
            if (!project) return;
            let html = `<div class="modal-content"><span class="close-btn" onclick="closeDetail()">&times;</span>`;
            html += `<div class="detail-title">${project.name}</div>`;
            html += `<div class="detail-section"><h4>基本信息</h4><p>所属区域：${project.province} · ${project.city} · ${project.district}</p><p>建设状态：${project.status} | 项目类型：${project.type} | 领域分类：${project.field}</p></div>`;
            if (project.overview) html += `<div class="detail-section"><h4>项目概述</h4><p>${project.overview}</p></div>`;
            if (project.content) html += `<div class="detail-section"><h4>主要建设内容</h4><p>${project.content}</p></div>`;
            if (project.significance) html += `<div class="detail-section"><h4>建设意义</h4><p>${project.significance}</p></div>`;
            if (project.source) html += `<div class="detail-section"><h4>数据来源</h4><p>${project.source}</p></div>`;
            html += `</div>`;
            const modal = document.createElement('div');
            modal.id = 'projectModal'; modal.className = 'modal'; modal.style.display = 'block';
            modal.innerHTML = html;
            document.body.appendChild(modal);
        }
        function closeDetail() {
            const modal = document.getElementById('projectModal');
            if (modal) modal.remove();
        }
        function toggleFilter() { const a = document.getElementById('filterArea'); a.style.display = a.style.display === 'none' ? 'block' : 'none'; }
        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { doSearch(); } });
    </script>
</body>
</html>
