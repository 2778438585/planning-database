</head>

    let selectedProvince = ''; let selectedCity = ''; window.selectedDistrict = '';

    function fullTextSearch(project, keyword) {
        if (!keyword) return true;
        const fields = [project.name, project.city, project.district, project.overview, project.content, project.significance, project.province, project.field, project.type, project.status];
        return fields.some(f => f && f.indexOf(keyword) !== -1);
    }

    function initRegionPanel() {
        const provinceList = document.getElementById('provinceList');
        const provinces = Object.keys(regionData).sort();
        provinceList.innerHTML = '';
        provinces.forEach(prov => {
            const span = document.createElement('span'); span.textContent = prov;
            span.onclick = () => selectProvince(prov); provinceList.appendChild(span);
        });
    }

    function selectProvince(prov) {
        selectedProvince = prov; selectedCity = ''; window.selectedDistrict = '';
        document.querySelectorAll('#provinceList span').forEach(s => s.classList.remove('active'));
        const provSpans = document.querySelectorAll('#provinceList span');
        provSpans.forEach(s => { if(s.textContent === prov) s.classList.add('active'); });
        const cityList = document.getElementById('cityList'); const districtList = document.getElementById('districtList');
        cityList.innerHTML = ''; districtList.innerHTML = '';
        if (regionData[prov]) {
            const cities = Object.keys(regionData[prov]).sort();
            cities.forEach(city => {
                const span = document.createElement('span'); span.textContent = city;
                span.onclick = () => selectCity(prov, city); cityList.appendChild(span);
            });
        }
        document.getElementById('citySearchInput').value = '';
        doSearch();
    }

    function selectCity(prov, city) {
        selectedCity = city; window.selectedDistrict = '';
        document.querySelectorAll('#cityList span').forEach(s => s.classList.remove('active'));
        const citySpans = document.querySelectorAll('#cityList span');
        citySpans.forEach(s => { if(s.textContent === city) s.classList.add('active'); });
        const districtList = document.getElementById('districtList'); districtList.innerHTML = '';
        if (regionData[prov] && regionData[prov][city]) {
            const districts = regionData[prov][city];
            districts.forEach(district => {
                const span = document.createElement('span'); span.textContent = district;
                span.onclick = () => selectDistrict(district); districtList.appendChild(span);
            });
        }
        doSearch();
    }
    function selectDistrict(district) {
        window.selectedDistrict = district;
        document.querySelectorAll('#districtList span').forEach(s => s.classList.remove('active'));
        const distSpans = document.querySelectorAll('#districtList span');
        distSpans.forEach(s => { if(s.textContent === district) s.classList.add('active'); });
        doSearch();
    }

    function filterCities() {
        const keyword = document.getElementById('citySearchInput').value.trim().toLowerCase();
        const citySpans = document.querySelectorAll('#cityList span');
        citySpans.forEach(span => { span.style.display = (keyword === '' || span.textContent.toLowerCase().includes(keyword)) ? '' : 'none'; });
    }

    function onKeywordInput() {
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) {
            initRegionPanel();
            document.getElementById('cityList').innerHTML = '';
            document.getElementById('districtList').innerHTML = '';
            return;
        }
        const provinceList = document.getElementById('provinceList');
        const allProvinces = Object.keys(regionData).sort();
        provinceList.innerHTML = '';
        allProvinces.forEach(prov => {
            if (prov.indexOf(keyword) !== -1 || projects.some(p => p.province === prov && fullTextSearch(p, keyword))) {
                const span = document.createElement('span'); span.textContent = prov;
                span.onclick = () => selectProvince(prov); provinceList.appendChild(span);
            }
        });
        document.getElementById('cityList').innerHTML = '';
        document.getElementById('districtList').innerHTML = '';
    }

    function toggleAllFilters() {
        const panel = document.getElementById('regionPanel'); const advFilters = document.getElementById('advancedFilters');
        if (panel.style.display === 'none' || panel.style.display === '') { panel.style.display = 'block'; advFilters.style.display = 'block'; }
        else { panel.style.display = 'none'; advFilters.style.display = 'none'; }
    }

    function resetAndSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('filterStatus').value = ''; document.getElementById('filterField').value = '';
        selectedProvince = ''; selectedCity = ''; window.selectedDistrict = '';
        document.getElementById('citySearchInput').value = '';
        document.querySelectorAll('#provinceList span, #cityList span, #districtList span').forEach(s => s.classList.remove('active'));
        document.getElementById('cityList').innerHTML = ''; document.getElementById('districtList').innerHTML = '';
        document.getElementById('regionPanel').style.display = 'none';
        document.getElementById('advancedFilters').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        initRegionPanel();
    }

    function filterByStatus(status) { resetAndSearch(); document.getElementById('filterStatus').value = status; doSearch(); }
    function filterByField(field) { resetAndSearch(); document.getElementById('filterField').value = field; doSearch(); }

        { name: "广州地铁14号线二期", province: "广东", city: "广州", district: "越秀区/白云区", status: "在建", type: "地铁", field: "轨道交通", overview: "14号线二期（广州火车站—嘉禾望岗）连接广州火车站交通枢纽与白云北部，与一期贯通运营。方便白云区居民快速进入市中心，强化广州火车站的集散能力。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁18号线北延（广花城际）", province: "广东", city: "广州", district: "天河区/白云区/花都区", status: "在建", type: "地铁", field: "轨道交通", overview: "18号线北延段（广花城际）自广州东站引出，经京溪路、白云东平、白云城市中心、方石、凤凰南路至花都花城街。实现天河CBD与白云机场、花都区的半小时快速通达，推动空港经济区发展，未来规划继续北延至清远。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁22号线北延（芳白城际）", province: "广东", city: "广州", district: "荔湾区/白云区/花都区", status: "在建", type: "地铁", field: "轨道交通", overview: "22号线北延段（芳白城际）从芳村站引出，向北经白云站、白云城市中心、人和，最终抵达白云机场。为广州西部提供直达机场的快线，缓解3号线压力，提升白云枢纽的辐射范围。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁8号线北延段及支线", province: "广东", city: "广州", district: "白云区/花都区/越秀区", status: "在建", type: "地铁", field: "轨道交通", overview: "8号线北延段（滘心—广州北站）及支线（江府—纪念堂），加强白云、花都与市中心联系，是广州北部重要的轨道交通加密线，支撑花都、白云沿线发展。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁8号线东延段", province: "广东", city: "广州", district: "海珠区/番禺区", status: "在建", type: "地铁", field: "轨道交通", overview: "8号线东延段（万胜围—莲花）将8号线向东延伸至番禺区莲花湾片区，支持广州“南拓”战略，加强海珠与番禺东部联系。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "穗莞深城际琶洲支线", province: "广东", city: "广州", district: "海珠区/番禺区", status: "在建", type: "城际铁路", field: "轨道交通", overview: "穗莞深城际琶洲支线连接琶洲与莲花站，是粤港澳大湾区城际网络的重要联络线。建成后琶洲可快速通达深圳、东莞，强化广深科技创新走廊的交通支撑。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广清城际南延", province: "广东", city: "广州", district: "花都区/白云区", status: "在建", type: "城际铁路", field: "轨道交通", overview: "广清城际南延线将线路从花都站向南延伸至广州白云站，强化广州与清远的交通联系，推动广清一体化发展，方便清远市民快速进入广州市中心。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州白云站综合交通枢纽", province: "广东", city: "广州", district: "白云区", status: "在建", type: "国铁枢纽", field: "轨道交通", overview: "主要办理京广高铁、广清城际、花广联络线等动车组。现有广州地铁8号线石潭站，12号线、22号线、24号线都在建设中。采用“可伸缩的车站、会呼吸的广场”设计，平时是休闲广场，春运时可变成扩展候车室。周边打造“广州时尚之都”城市综合体。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州站至广州南站联络线", province: "广东", city: "广州", district: "越秀区/荔湾区/番禺区", status: "在建", type: "国铁", field: "轨道交通", overview: "自广州站引出，经荔湾区接入广州南站，连通广州站、白云站、广州南站三大枢纽。把京广高铁、广深港高铁引入市中心，实现高铁进城，以后在越秀区就能坐高铁去北京、香港。线路正在全面施工进行隧道掘进，计划2027年底建成通车。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州东站改造", province: "广东", city: "广州", district: "天河区", status: "在建", type: "国铁枢纽", field: "轨道交通", overview: "按“地面+地下”模式扩建，配合引入地铁18号线、11号线及规划城际。配合在建的“广州站至广州南站联络线”，新建地下高铁场，实现高铁直接进入天河核心区，让高铁开进广州最繁华的CBD区域。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁22号线南延段", province: "广东", city: "广州", district: "番禺区/南沙区", status: "规划/预备", type: "地铁", field: "轨道交通", overview: "自番禺广场站引出，经南沙客运港，跨海至东莞滨海湾新区，终至深圳光明城。是粤港澳大湾区城际铁路网的重要组成部分，建成后将实现广州南沙与深圳光明城的快速连接。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁28号线（佛穗莞城际）", province: "广东", city: "广州", district: "佛山/广州/东莞", status: "规划/预备", type: "城际铁路", field: "轨道交通", overview: "佛穗莞城际连接佛山、广州、东莞三市，是粤港澳大湾区东西向骨干城际线路。途经佛山新城、广州琶洲、东莞松山湖等核心节点，是湾区“一小时生活圈”的关键线路。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁37号线（知识城快线）", province: "广东", city: "广州", district: "天河区/黄埔区/从化区", status: "规划/预备", type: "地铁", field: "轨道交通", overview: "37号线（广州东站—黄埔知识城—从化）是知识城与市中心快速联系的重要规划线路。建成后知识城到广州东站仅需约20分钟，极大缩短知识城与中心城区的时空距离。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁15号线一期", province: "广东", city: "广州", district: "南沙区", status: "规划/预备", type: "地铁", field: "轨道交通", overview: "15号线一期是南沙内部环线，串联南沙区内重点发展区域，接驳18号线等进城快线。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广深第二高铁", province: "广东", city: "广州/深圳", district: "规划中", status: "规划/预备", type: "高铁", field: "轨道交通", overview: "广州至深圳第二条高速铁路通道，广州段走向及枢纽选址正在研究中。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州地铁26号线（广州大道线）", province: "广东", city: "广州", district: "规划中", status: "规划/预备", type: "地铁", field: "轨道交通", overview: "26号线（广州大道线）及19号线等已进入线网规划阶段，正在推进前期工作。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "深中通道", province: "广东", city: "深圳/中山", district: "宝安区/翠亨新区", status: "在建", type: "过江通道", field: "轨道交通", overview: "连接深圳与中山的跨海通道，集桥、岛、隧于一体，全长约24公里，通车后深中两地车程缩短至30分钟以内。", source: "广东省2026年重点建设项目计划", issuer: "广东省发展和改革委员会", source_detail: "广东省发展和改革委员会关于印发广东省2026年重点建设项目计划的通知", link: "" },
        { name: "广州机器人产业园", province: "广东", city: "广州", district: "黄埔区", status: "在建", type: "产业园", field: "机器人", overview: "聚焦工业机器人、服务机器人、特种机器人研发制造，引进多家头部企业，打造粤港澳大湾区机器人产业高地。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州白云国际机场三期扩建工程", province: "广东", city: "广州", district: "花都区/白云区", status: "在建", type: "机场", field: "轨道交通", overview: "广州白云国际机场三期扩建工程是粤港澳大湾区世界级机场群建设的核心项目。主要建设内容包括新建T3航站楼、第四第五跑道、配套综合交通中心（GTC）等。", content: "1. 新建T3航站楼：作为主航站区的重要组成部分，承担新增旅客吞吐量。2. 新建第四、第五跑道：其中第四跑道为西二跑道，第五跑道为东三跑道，大幅提升机场起降容量。3. 配套综合交通中心（GTC）：集高铁、城际、地铁、巴士等多种交通方式于一体，实现零距离换乘。4. 配套工作区及货运区：包括机务维修、航空配餐、货运物流等保障设施。", significance: "1. 突破容量瓶颈：白云机场现有T1、T2航站楼设计容量已趋饱和，三期扩建完成后，终端年旅客吞吐能力可达1.2亿人次、货邮吞吐能力380万吨，满足远期发展需求。2. 支撑大湾区战略：强化广州国际航空枢纽地位，与香港、深圳机场协同发展，共同构建世界级机场群。3. 促进临空经济：带动花都空港经济区、白云北部片区发展，集聚航空物流、高端制造、跨境电商等临空指向型产业。4. 提升出行体验：通过综合交通中心实现“空铁联运”，旅客可便捷换乘高铁、城际及地铁线路，扩大机场辐射范围。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "冷泉生态系统研究装置", province: "广东", city: "广州", district: "南沙区", status: "在建", type: "大科学装置", field: "科技设施", overview: "冷泉生态系统研究装置是“十四五”期间优先建设的国家重大科技基础设施之一，落户于广州南沙科学城。该装置是全球首个针对深海冷泉生态系统开展系统性、集成化研究的重大科技平台，由中国科学院南海海洋研究所牵头建设。", content: "1. 冷泉生态系统模拟实验系统：在陆地上高精度还原深海冷泉的极端环境（高压、低温、富甲烷等），开展冷泉生物生命过程与生态系统演替模拟研究。2. 冷泉环境原位观测系统：研制深海原位观测设备，实现对冷泉区物理、化学、生物参数的长期连续监测。3. 冷泉资源开发技术验证平台：探索冷泉区天然气水合物（可燃冰）等资源的绿色开发技术，评估环境影响。4. 数据管理与科学分析中心：汇集模拟与原位观测数据，建立冷泉生态系统数字孪生模型，为全球冷泉研究提供数据共享服务。", significance: "1. 抢占深海科技制高点：冷泉是地球深部碳循环的关键节点，也是天然气水合物资源的重要赋存区。建设该装置使我国在深海极端生态系统研究领域从“跟跑”转向“领跑”。2. 揭示生命起源奥秘：冷泉系统中不依赖阳光、以化学合成为基础的黑暗生物圈，是研究地球早期生命演化、探索外星生命可能的天然实验室。3. 支撑可燃冰安全开发：天然气水合物是潜力巨大的战略接替能源，装置提供的模拟与验证能力，是确保商业化开采安全环保的前置技术保障。4. 带动粤港澳科技协同：装置落户南沙，将吸引全球深海科技顶尖团队，带动海洋装备制造、海洋生物医药等关联产业集群。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "人类细胞谱系大科学研究设施", province: "广东", city: "广州", district: "黄埔区", status: "在建", type: "大科学装置", field: "科技设施", overview: "人类细胞谱系大科学研究设施是“十四五”期间国家重点布局的重大科技基础设施之一，落户于广州黄埔区生物岛。该设施旨在绘制人类全生命周期、全细胞类型的动态谱系图谱，建成后将成为全球首个跨尺度、多模态的人类细胞谱系研究平台。", content: "1. 细胞谱系高通量获取系统：开发自动化、高通量的单细胞测序与空间组学技术平台，实现对人体各组织器官细胞的大规模、高精度图谱绘制。2. 细胞谱系动态追踪系统：利用基因编辑、谱系示踪等技术，在活体或类器官模型中追踪细胞的分化、迁移、衰老与病变过程。3. 细胞谱系计算与建模平台：构建超级计算与人工智能分析系统，整合多组学数据，建立人类细胞谱系的数字孪生模型，实现虚拟推演与预测。4. 临床转化与应用验证中心：将细胞谱系研究成果向疾病早期诊断、精准治疗、药物筛选、再生医学等方向转化。", significance: "1. 破解生命密码的基础工程：人体由约37万亿个细胞构成，每个细胞的来源、去向、命运如何决定，至今仍是生命科学的根本难题。该设施将系统回答“细胞从哪里来、到哪里去”这一核心问题。2. 推动医学范式变革：有了完整的细胞谱系图谱，医生可以精确判断疾病起源于哪类细胞的何种异常变化，实现从“对症治疗”到“对因治疗”的跨越，为癌症、心脑血管病、退行性疾病等重大慢性病提供全新诊疗策略。3. 抢占国际生命科学制高点：目前国际上“人类细胞图谱计划”尚未形成完整体系，我国率先建成该装置，将在生命科学大数据、人工智能辅助诊断等前沿领域建立领先优势。4. 带动生物医药产业发展：设施落户广州黄埔，将为粤港澳大湾区生物医药企业提供核心底层数据与验证平台，加速创新药研发、细胞治疗技术突破，支撑千亿级生物医药产业集群。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州实验室", province: "广东", city: "广州", district: "黄埔区", status: "持续建设", type: "国家实验室", field: "科技设施", overview: "广州实验室是经国家批准设立的新型科研事业单位，是国家战略科技力量的重要组成部分。实验室于2021年正式挂牌成立，落户广州黄埔区国际生物岛。实验室聚焦呼吸系统疾病及其防控领域，开展基础研究、应用基础研究、关键核心技术攻关和成果转化，致力于打造具有全球影响力的呼吸系统疾病研究高地。", content: "1. 基础研究平台：建设呼吸系统疾病病原学、免疫学、病理学等基础研究平台，系统解析呼吸系统重大疾病的发病机制。2. 关键核心技术攻关平台：围绕新发突发呼吸道传染病、重大慢性呼吸系统疾病，开展疫苗、药物、诊断试剂等关键技术研发。3. 生物安全研究设施：建设高等级生物安全实验室，具备开展高致病性病原微生物研究的条件，支撑国家生物安全战略。4. 临床转化医学中心：与钟南山院士团队及广州医科大学附属第一医院等临床机构深度协同，推动科研成果快速向临床诊疗方案转化。5. 大数据与人工智能平台：构建呼吸系统疾病多组学数据库，利用人工智能辅助药物筛选、疫情预测与诊疗决策。", significance: "1. 捍卫国家生物安全：新冠疫情暴露出全球在呼吸道传染病防控方面的短板。广州实验室以呼吸系统重大传染病防控为核心使命，是国家构筑生物安全防线的核心力量。2. 巩固优势学科领先地位：广州在呼吸系统疾病研究领域拥有钟南山院士领衔的国际顶尖团队，实验室的建立使这一优势学科获得国家级平台支撑，有助于保持和扩大全球领先地位。3. 应对慢性呼吸疾病负担：慢阻肺、哮喘、肺癌等慢性呼吸系统疾病是我国居民主要死因之一。实验室从基础研究到临床应用的全链条布局，将加速新药、新疗法的产出，惠及亿万患者。4. 带动粤港澳大湾区生物医药产业：实验室位于广州生物岛，与黄埔区生物医药产业集群密切联动，将成为吸引全球顶尖人才、孵化创新药企的磁石，支撑大湾区打造世界级生物医药产业高地。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州人工智能与数字经济试验区", province: "广东", city: "广州", district: "琶洲/金融城/鱼珠", status: "持续建设", type: "产业平台", field: "科技设施", overview: "广州人工智能与数字经济试验区是广东省贯彻落实国家数字经济发展战略的重大平台，2020年正式启动建设。试验区以琶洲为核心，联动金融城和鱼珠，总面积约81平方公里，目标是打造人工智能与数字经济产业集聚区、技术创新策源地、应用场景示范区和产城融合样板区。", content: "1. 琶洲核心片区（海珠区）：定位为人工智能与数字经济总部经济集聚区。已引入阿里巴巴华南总部、腾讯广州总部、唯品会、小米、科大讯飞等头部企业总部。重点发展互联网、大数据、人工智能、云计算等数字产业。2. 广州国际金融城片区（天河区）：定位为金融科技与数字经济融合示范区。重点发展数字金融、金融科技、风险投资、数字贸易等业态，吸引广发银行、万联证券等金融机构总部入驻，同步建设金融监管基础设施。3. 鱼珠片区（黄埔区）：定位为人工智能与智能制造融合发展区。依托黄埔区制造业基础，聚焦工业互联网、智能装备、区块链、信创产业，推动数字经济与实体经济深度融合。4. 配套基础设施：建设5G网络全覆盖、智慧灯杆、数据中心等数字基础设施，以及穗莞深城际琶洲支线、车陂南隧道等交通配套，实现片区互联互通。5. 创新平台与场景应用：布局琶洲实验室（人工智能与数字经济广东省实验室）、国家超算广州中心琶洲分中心等创新平台，并在无人驾驶、智慧医疗、数字政务等领域开放应用场景。", significance: "1. 建设数字经济强国标杆：试验区是广州代表国家参与全球数字经济竞争的核心载体，目标是建成世界一流的数字经济示范区，为国家数字经济创新发展提供“广州经验”。2. 驱动广州产业升级：广州传统商贸、制造产业体量庞大。试验区将人工智能、大数据等技术与传统产业深度融合，推动从“广州制造”向“广州智造”转型，培育新的经济增长点。3. 集聚全球创新资源：琶洲已形成与北京中关村、深圳南山齐名的数字经济总部集聚区，持续吸引全球顶尖人才、技术和资本，强化粤港澳大湾区在全球科技版图中的位势。4. 打造粤港澳合作新空间：试验区为港澳青年创新创业提供空间载体，推动穗港澳在数字规则互认、数据跨境流动、科技协同创新等方面先行先试，服务粤港澳大湾区一体化发展。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "南沙科学城（明珠科学园核心区）", province: "广东", city: "广州", district: "南沙区", status: "在建", type: "科技园区", field: "科技设施", overview: "南沙科学城是粤港澳大湾区国际科技创新中心建设的重要载体，由广州市与中国科学院于2019年签约共建。科学城规划总面积约99平方公里，其中明珠科学园为核心启动区，位于南沙区珠江街，规划面积约3.1平方公里，是科学城的“心脏”和首批集中建设区域。", content: "1. 科研院所集聚区：推动中国科学院南海海洋研究所、中国科学院广州分院、中国科学院大学广州学院等机构整体搬迁或设立分支机构，形成海洋科学、地球科学、环境科学等领域的科研集群。2. 重大科技基础设施集聚区：在明珠科学园内或周边统筹布局冷泉生态系统研究装置、人类细胞谱系大科学研究设施、极端海洋环境模拟设施等国家重大科技基础设施，形成大科学装置集群效应。3. 科教融合区：建设中国科学院大学广州学院（黄埔），推动研究生培养与科研实践紧密结合，为大湾区输送高层次科技人才。4. 成果转化与产业孵化区：建设科技企业孵化器、中试基地和产业加速器，聚焦海洋科技、新能源、新材料、人工智能等领域，推动科研成果就地转化。5. 生活配套服务区：建设人才公寓、学校、医院、商业综合体等生活配套设施，打造宜居宜业的科学家社区。", significance: "1. 构建大湾区原始创新策源地：南沙科学城是粤港澳大湾区综合性国家科学中心的主要承载区之一，与深圳光明科学城、东莞松山湖科学城协同联动，共同构建大湾区“源头创新—技术攻关—产业转化”全链条创新体系。2. 填补广州国家级科学中心空白：广州作为国家中心城市和科教重镇，迫切需要建设国家级综合性科学中心。南沙科学城承担了这一使命，使广州从“科教大市”向“科创强市”迈进。3. 深化粤港澳科技协同创新：南沙地处大湾区地理几何中心，区位优势突出。科学城将为港澳高校、科研机构参与国家重大科技项目提供空间载体和制度通道，推动规则对接和要素跨境流动。4. 带动南沙高质量发展：南沙是广州“双核”之一，科学城的建设将大幅提升南沙的人口素质、产业能级和城市品位，帮助南沙从传统开发区向现代化滨海新城转型，实现“以科兴城、以城聚人”的良性循环。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "知识城科教创新区", province: "广东", city: "广州", district: "黄埔区", status: "在建", type: "科教园区", field: "科技设施", overview: "知识城科教创新区是中新广州知识城“一核两心三区多园”总体布局中的核心功能板块之一，定位为粤港澳大湾区高水平科教协同创新高地。该区域规划集中引进国内外知名高校和科研院所设立研究院、研究生院及产学研基地，打造“教育—科研—产业”三位一体的科教新城。", content: "已引入或正在建设的主要院校及机构：1. 西安电子科技大学广州研究院：聚焦新一代信息技术、人工智能、半导体与集成电路等领域，开展研究生培养与成果转化。2. 广东外语外贸大学黄埔研究院：围绕语言科学、国际传播、涉外法治等领域，建设高端翻译与国际传播人才培养基地。3. 广州大学黄埔研究院：依托广州大学优势学科，布局网络空间安全、人工智能与区块链、智慧城市等研究方向。4. 中国社会科学院大学黄埔高等研究院：开展人文社科高层次人才培养，建设高端智库，服务粤港澳大湾区决策咨询需求。5. 新加坡国立大学广州创新研究院（共建意向推进中）：借助知识城中新合作机制，引入新加坡国立大学在智慧城市、金融科技等领域的科研与产业化资源。", significance: "1. 填补广州东部高等教育空白：广州高校主要集中在中心城区和番禺大学城，东部黄埔区高校资源长期不足。科教创新区的建设将从根本上优化广州高等教育空间布局。2. 形成“研究院经济”新模式：不同于传统大学以本科教学为主，该区域高校研究院以研究生培养和产业技术攻关为核心任务，直接为知识城集成电路、生物医药、人工智能等战略性新兴产业输送高端人才和技术解决方案。3. 强化粤港澳科教协同：借助知识城作为“中新国家级双边合作项目”和“粤港澳大湾区知识创造示范区”的政策叠加优势，科教创新区将成为吸引港澳及国际一流高校设立分支机构的优选地，推动大湾区规则对接和科教要素跨境流动。4. 支撑知识城向“知识创造”转型：知识城从初期的基础设施建设阶段进入以知识经济为核心的高质量发展新阶段，科教创新区是知识城的大脑和人才源泉，为“知识创造—技术转化—产业孵化”全链条提供最根本的智力支撑。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州国际生物岛", province: "广东", city: "广州", district: "黄埔区", status: "扩容提升中", type: "产业园区", field: "科技设施", overview: "广州国际生物岛原名官洲岛，是珠江入海口的一座江心岛，面积约1.83平方公里。2000年获批立项建设，2011年正式开岛运营，定位为国际一流的生物医药研发创新高地。目前生物岛已完成首期开发，正在推进扩容提升工程，旨在突破土地瓶颈，拓展发展空间，提升创新能级。", content: "扩容提升主要方向：1. 空间扩容：原有1.83平方公里已基本开发完毕，岛内土地资源紧张。扩容方案拟通过岛外拓展和岛内集约化改造两种路径扩大产业发展空间。2. 功能提升：从“研发中试基地”向“研发+总部+转化+服务”四位一体升级，吸引更多全球顶尖生物医药企业设立区域总部或全球研发中心。3. 平台升级：对标国际一流标准，建设升级版生物安全实验室、GMP中试车间、实验动物中心等公共技术服务平台。4. 创新生态优化：引入更多风险投资、知识产权服务、CRO、CDMO等专业服务机构，完善全链条服务体系。5. 产城融合配套：增加国际人才公寓、国际学校、高端医疗等服务配套，提升对海外高端人才的吸引力。", significance: "1. 支撑广州打造全球生物医药产业高地：生物岛是广州生物医药产业的核心引擎，扩容提升后将承载更多全球顶尖企业和创新项目，推动广州从国内生物医药重镇向具有全球影响力的产业高地跃升。2. 保障国家生命健康安全：生物岛集聚了广州实验室、人类细胞谱系大科学设施等国之重器，是国家应对重大新发突发传染病、掌握生物安全主动权的战略支点之一。3. 破解产业发展空间瓶颈：首期1.83平方公里承载空间已趋饱和，扩容提升是维持生物岛持续竞争力的必然选择，也是广州向有限土地要更高产出的集约化发展探索。4. 深化粤港澳生物医药产业协同：生物岛毗邻港澳，扩容提升将拓展与香港科技园、澳门大学等机构的合作空间，助力大湾区生物医药产业规则对接和资源互通。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "粤港澳大湾区纳米产业创新高地", province: "广东", city: "广州", district: "黄埔区", status: "在建", type: "产业平台", field: "科技设施", overview: "粤港澳大湾区纳米产业创新高地是广州市黄埔区依托其雄厚的产业基础与科研优势，重点打造的纳米科技产业化平台。项目瞄准纳米材料、纳米生物医药、纳米智能器件三大核心赛道，致力于构建从基础研究到应用开发，再到规模化生产和市场推广的完整纳米产业生态闭环，目标是建成具有全球影响力的纳米科技创新及产业转化中心。", content: "1. 核心研发设施：依托广东粤港澳大湾区国家纳米科技创新研究院（广纳院），建设纳米加工与表征平台、纳米生物安全评价中心、纳米催化与能源转化实验室等核心科研设施。2. 中试与产业化加速器：在黄埔区知识城、科学城布局纳米产业加速基地，提供标准化与定制化结合的GMP车间、中试生产线，解决纳米科技成果从实验室样品到市场化产品的关键瓶颈。3. 产业集聚与孵化空间：规划建设标志性园区，重点引进和孵化纳米材料（如石墨烯、碳纳米管）、纳米生物医药（如靶向药物递送系统）、智能纳米器件（如微纳传感器）三大领域的领军企业与初创公司。4. 公共服务与检测平台：建立面向大湾区的纳米技术测试与标准服务中心，提供材料表征、性能测试、可靠性评价等全流程公共服务，降低中小企业研发成本。", significance: "1. 抢占未来材料与器件制高点：纳米技术是集成电路超越摩尔定律、生物医药精准诊疗、新能源高效转化的底层支撑。建设高地有助于我国在下一轮全球技术竞赛中占据先机，避免关键材料与器件受制于人。2. 赋能大湾区先进制造业集群：广州、深圳、东莞聚集了大量电子信息、汽车、生物医药企业。纳米技术作为通用目的使能技术，能显著提升这些终端产品的性能与附加值，推动大湾区从“组装制造”向“材料定义”转型升级。3. 承接顶尖科技成果就地转化：广纳院等高水平科研机构沉淀了大量国际前沿成果。创新高地提供熟化、中试、融资一站式服务，能够有效拦截科技成果外流，在黄埔就地形成产业价值。4. 维护产业链供应链安全韧性：高端纳米材料是高精尖设备的“牙齿”和“皮肤”。在黄埔构建自主可控的纳米材料制备与供应体系，可显著降低大湾区乃至国家在高端制造领域对进口原料的依赖，提升产业链应对风险的能力。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州火车站及周边片区更新改造", province: "广东", city: "广州", district: "越秀区", status: "规划/预备", type: "城市更新", field: "城市更新", overview: "广州火车站及周边片区更新改造是广州老城区复兴的关键工程，涵盖广州火车站站房及站场改造、综合交通枢纽提升、周边城市更新三大板块。项目以高铁引入中心城区为契机，统筹推进枢纽升级、产业转型、城市修补和民生改善，目标是打造“站城产人文”一体化的粤港澳大湾区门户客厅。", content: "1. 火车站枢纽改造升级：广州火车站既有站场建于1974年，设施老化、容量不足。规划将普速列车功能向外疏解，引入京广高铁、广汕高铁、广湛高铁等高铁线路，使广州站从普铁站升级为高铁枢纽。同步改造站房、站台及换乘大厅，提升旅客体验。2. 综合交通换乘中心：整合地铁2号线、5号线、11号线（在建）、14号线二期（在建）及规划线路，建设无缝衔接的地下换乘大厅。配套建设公交总站、出租车场站、社会停车场等地面交通设施。3. 站前广场及景观改造：对站前广场、草暖公园及周边公共空间进行整体景观提升，重塑火车站城市门户形象，增强公共活动与集散功能。4. 周边旧城更新：对火车站周边老旧小区、批发市场、低效产业用地进行更新改造。腾退低端商贸物流功能，植入科技创新、文化创意、商务办公等新型业态，疏解非核心功能，优化人口结构。5. 基础设施补短板：同步提升片区地下管网、供电设施、海绵城市等市政基础设施，新建或改扩建学校、社区卫生服务中心、养老设施等公共服务配套。", significance: "1. 实现高铁进城战略：广州南站距离市中心较远，中心城区长期缺乏高铁直达站点。广州火车站升级为高铁枢纽后，市民和商务旅客可在市中心直接乘坐高铁，大幅缩短出行时间，强化广州作为国家综合性门户城市的枢纽能级。2. 推动越秀老城区复兴：火车站周边是广州传统商贸聚集区，但随着产业外迁和城市中心东移，片区活力有所下降。更新改造将导入高附加值产业和新居民群体，带动越秀区北部城区重塑发展动力，实现“老城市新活力”。3. 提升大湾区互联互通：广州火车站引入高铁后，将与广州南站、广州东站、白云站共同构成“一心五向”铁路客运枢纽体系，实现与大湾区各城市更紧密的“一小时交通圈”，加速人流、商务流、信息流高效融通。4. 改善人居环境与城市品质：周边片区老旧房屋密集、公共空间不足、基础设施老化。通过城市更新，将显著改善居民居住条件，增加绿地和公共活动空间，提升城市安全韧性和宜居水平。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "康鹭片区城中村改造", province: "广东", city: "广州", district: "海珠区", status: "在建", type: "城市更新", field: "城市更新", overview: "康鹭片区是广州市中心城区规模最大、人口密度最高的城中村区域之一，由康乐村和鹭江村两个行政村组成，占地面积约110公顷，常住人口超过10万人。片区内房屋密集、建筑质量差、基础设施严重滞后，长期存在消防、治安、卫生等突出隐患。2023年，康鹭片区城中村改造项目正式纳入广州市城市更新年度计划并启动实施。", content: "1. 房屋征收与拆除重建：对片区内老旧住宅及违法建筑依法实施征收与拆除，重新规划建设安置房、商品住宅及保障性租赁住房。2. 产业升级与腾退转型：康鹭片区长期以服装加工、批发零售等低端劳动密集型产业为主，改造将有序疏解非核心产业功能，导入数字经济、时尚创意设计、现代商贸服务等高端业态。3. 市政基础设施补短板：全面更新改造片区排水管网、供电设施、燃气管道等老旧市政设施，解决逢雨必涝、电线乱拉、消防安全隐患突出等长期顽疾。4. 公共服务设施配套：规划新建或扩建中小学、幼儿园、社区卫生服务中心、养老服务站、文化站、体育健身场所等公共服务设施，补齐民生短板。5. 公共空间与景观提升：重新梳理片区路网结构，打通断头路，增加公共绿地、广场和慢行系统，改善人居环境品质和城市界面形象。", significance: "1. 消除重大公共安全隐患：改造前的康鹭片区“一线天”“握手楼”遍布，消防通道严重堵塞，火灾、疫情等突发事件风险极高。通过改造，将从根本上消除威胁十余万居民生命财产安全的长期隐患，筑牢城市安全底线。2. 破解超大城市治理难题：康鹭片区是广州“城中村”问题的典型缩影——人口倒挂严重、公共服务缺失、社会矛盾集中。其改造经验将为广州乃至全国其他超大特大城市解决同类“大城市病”提供可复制的制度探索和实践样本。3. 推动城市产业跃迁：将低附加值的服装加工集散地转型为时尚设计、数字贸易高地，是海珠区实现产业“腾笼换鸟”的破局之举。改造后的康鹭将融入琶洲人工智能与数字经济试验区辐射圈，承接创新溢出效应。4. 促进社会公平与民生改善：改造将为本地村民提供更优质的居住环境和稳定的财产性收益，为外来务工人员提供更安全、更有尊严的居住选择（保障性租赁住房），实现各群体共享城市发展红利的包容性增长。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "黄埔区多个旧村改造（笔村、火村、暹岗等）", province: "广东", city: "广州", district: "黄埔区", status: "在建", type: "城市更新", field: "城市更新", overview: "黄埔区是广州市城市更新任务最重、推进速度最快的行政区之一。笔村、火村、暹岗等旧村改造项目是黄埔区“三旧”改造的重点工程，旨在通过拆除重建、功能提升和产业导入，将原本建筑老旧、配套缺失、环境脏乱的城中村，改造为功能完善、环境优美、产业升级的现代化城市社区。", content: "1. 复建安置区：为原村民建设高标准复建住宅及集体物业，保障村民居住权益和长期经济收益。2. 融资住宅区：通过公开出让部分居住用地，引入品牌开发商建设商品住宅，平衡改造成本。3. 产业升级区：腾退原有低端加工厂、小作坊，结合各旧村区位优势，导入科技创新、企业孵化、商业服务等新型产业载体。4. 市政与公服配套：系统改造村内道路、供水、排水、电力、燃气等老旧管网，新建或扩建中小学、社区卫生服务中心、文化站、肉菜市场等公建配套设施。5. 生态与文化保护：对村内古树名木、历史建筑、祠堂庙宇等进行普查登记，制定保护方案。", significance: "1. 消除城市安全隐患：改造前，这些旧村普遍存在建筑质量差、消防通道堵塞、电线私拉乱接等严重问题，改造从根本上消除了威胁数万村民生命财产的长期隐患。2. 释放产业发展空间：黄埔区土地开发强度高，增量空间有限。通过旧村改造盘活低效存量用地，为科学城、知识城、临港经济区等重点功能平台腾挪出宝贵的产业空间。3. 提升城市功能品质：旧村改造不仅是“拆房子”，更是系统性补齐公共服务短板。4. 探索超大城市更新路径：黄埔区作为全国首个区级“三旧”改造改革创新试点，笔村、火村、暹岗等项目在补偿安置方案、多方利益平衡、历史用地处理等方面的实践经验，为广州乃至全国城中村改造提供了可参考的“黄埔模式”。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "沥滘城中村改造", province: "广东", city: "广州", district: "海珠区", status: "在建", type: "城市更新", field: "城市更新", overview: "沥滘村是广州市中心城区规模最大的城中村之一，位于海珠区南部、珠江后航道北岸，村域面积约151公顷，常住人口近10万人。沥滘村改造项目是海珠区城市更新的标志性工程，自2014年表决通过改造方案，历经多年稳步推进，目前复建安置区、融资区及公建配套建设均处于在建状态。项目定位为“珠江后航道滨水新城”，目标是建成集居住、商务、休闲、生态于一体的现代化滨江社区。", content: "1. 复建安置区：为沥滘村原村民建设复建住宅及集体物业，总建筑面积超过100万平方米。2. 融资住宅区：通过公开出让部分地块，引入品牌开发商建设商品住宅，配套商业街区、社区服务中心等设施。3. 产业升级区：依托珠江后航道滨水区位优势，规划建设滨水商务办公区、创新产业园区，承接琶洲人工智能与数字经济试验区的辐射溢出效应。4. 公建配套设施：系统规划并新建或扩建多所中小学、幼儿园、社区卫生服务中心、老年人福利院、肉菜市场、文化站、体育健身场所等公共服务设施。5. 生态与文化保护：严格保护沥滘村内登记在册的历史建筑、祠堂、古树名木等文化遗产，同步推进珠江后航道滨水绿带建设，打造贯通的滨水公共休闲空间。", significance: "1. 破解超大城市中心区更新难题：沥滘村改造历时近二十年，历经规划编制、方案表决、地块分期出让等多个复杂阶段，是广州乃至全国特大城中村改造中“长周期、大体量、稳推进”的典型样本。2. 打通广州城市新中轴南延节点：沥滘位于广州城市新中轴线南端，改造后，将打通中轴线南段的城市界面阻隔。3. 释放珠江后航道发展潜力：珠江后航道是广州中心城区不可多得的滨水空间资源。沥滘改造将推动后航道从“工业锈带”向“生活秀带”“创新秀带”转型。4. 改善数万村民居民生活条件：改造前沥滘村房屋密集破旧、公共空间极度匮乏、市政设施严重老化。改造后，原村民将获得现代化安置住房和稳定的集体物业收益分红。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "天河区冼村改造", province: "广东", city: "广州", district: "天河区", status: "在建", type: "城市更新", field: "城市更新", overview: "冼村是广州城市新中轴线上最后一个城中村改造项目，位于珠江新城中央商务区核心腹地，地理位置极为特殊。冼村改造自2008年启动，历经十余年持续推进，目前处于收尾阶段，绝大部分复建安置房已封顶交付，剩余地块正在加紧建设。改造完成后，冼村将彻底融入珠江新城城市肌理。", content: "1. 剩余复建安置房建设：冼村一至五期复建安置房已基本建成并交付村民回迁，剩余少量安置房楼栋处于主体施工或装修阶段。2. 集体物业建设：冼村集体物业规划建设酒店、写字楼及商业综合体，建成后将为村民提供长期稳定的集体经济收益来源。3. 市政道路与公共空间：冼村原有握手楼已基本拆除完毕，正在按规划新建市政道路，贯通冼村路、金穗路等城市干道。4. 公共服务配套：配建幼儿园、社区服务中心、老年人活动中心等公共服务设施。5. 文化保护：对村内登记保护的祠堂、古树等文化遗产进行原址保护或就近迁移。", significance: "1. 缝合城市新中轴线最后缺口：冼村位于珠江新城核心区，周边摩天大楼林立，是广州城市客厅的中心位置。改造完成后，新中轴线上的这块“城市伤疤”将彻底消失。2. 释放CBD核心区土地价值：珠江新城土地资源极度稀缺，冼村改造释放出核心区最后一块可成片开发的土地。3. 保障村民共享城市发展红利：冼村村民回迁至原地新建的现代化安置房，居住条件发生根本性改善。村集体持有的酒店、写字楼等高端物业将持续产生租金收益。4. 攻坚改造深水区提供示范：冼村改造历时十余年，其最终突破为广州乃至全国其他城市核心区城中村改造项目提供了宝贵经验。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "珠三角水资源配置工程广州段", province: "广东", city: "广州", district: "南沙区/番禺区/黄埔区", status: "在建", type: "水利工程", field: "水利设施", overview: "珠三角水资源配置工程是国务院部署的172项节水供水重大水利工程之一，主体工程全长约113公里，已于2024年正式通水。广州段配套管网建设是主体工程的“最后一公里”，旨在将干线输送来的西江水接入广州市南沙区、番禺区、黄埔区等受水区域的市政供水管网。", content: "1. 南沙区配套管网：新建从南沙支线取水口至黄阁水厂、万顷沙水厂、榄核水厂等主力水厂的输水管道。2. 番禺区配套管网：建设从广州南站附近分水口至番禺区内各水厂的配水管道。3. 黄埔区配套管网：结合广州东部供水需求，建设从南岗分水口接入的输水管线，向科学城、知识城等区域延伸供水。4. 加压泵站与调节设施：在各受水区域关键节点建设加压泵站和蓄水池。5. 智慧水务系统：同步建设配套管网的在线监测、远程调控和漏损预警系统。", significance: "1. 保障南沙国家战略平台用水安全：南沙是粤港澳全面合作示范区和广州城市副中心，原有水源主要依赖本地河网，水质和水量均难以满足长远发展需求。西江水质优良、水量充沛，配套管网建成后，将为南沙科学城、南沙港等重大平台提供稳定可靠的水源保障。2. 优化广州南部供水结构：番禺区、南沙区过去长期依赖沙湾水道等本地河涌水源，枯水期易受咸潮倒灌影响，引入西江水将从根本上改变这一被动局面。3. 提升城市供水安全韧性：配套管网与广州现有供水体系实现互联互通后，形成“西江水源为主、本地水源备用、多厂联网调度”的供水格局。4. 支撑东部产业带用水需求：黄埔区科学城、知识城是广州科技创新和先进制造业的核心载体，配套管网延伸至黄埔，将为集成电路、生物医药等对水质有高要求的产业提供优质水源保障。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州北江引水工程", province: "广东", city: "广州", district: "花都区/白云区", status: "在建", type: "水利工程", field: "水利设施", overview: "广州北江引水工程是广州市构建“多水源供水保障体系”的关键性骨干工程，主要解决广州北部地区（花都区、白云区北部）长期存在的水资源短缺问题。工程从清远市境内的北江干流取水，经输水管道和隧洞引至广州花都区，为广州北部区域提供优质、稳定的新水源。", content: "1. 取水工程：在清远市清城区北江干流新建取水泵站，设计取水规模约100万立方米/日。2. 输水管道与隧洞：新建输水线路全长约26公里，其中输水隧洞约14公里，输水管道约12公里。3. 新建花都水厂：在花都区狮岭镇新建一座现代化自来水厂，一期设计规模约40万立方米/日。4. 配水管网配套：建设从花都新水厂至花都中心城区、空港经济区、白云北部等受水区域的配水主干管网。5. 智慧水务系统：同步建设取水、输水、制水、配水全流程的在线监测与远程调控系统。", significance: "1. 破解广州北部缺水困局：花都区和白云区北部长期以来主要依赖流溪河水源，北江引水工程建成后，将为广州北部新增稳定水源。2. 保障空港经济区用水需求：花都区是广州白云国际机场所在地，北江引水将为空港经济区提供可靠的水源保障。3. 优化广州供水水源结构：北江引水工程为广州新增第四大水源，形成东江、西江、北江、流溪河“四源共济”的供水格局。4. 改善居民饮用水品质：北江水质总体优良，新建水厂采用深度处理工艺。5. 支撑广州北部区域高质量发展：随着知识城、空港经济区等重点功能平台向北部延伸，北江引水工程超前布局建设，为北部区域提供长远的水资源战略储备。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州市深层隧道排水系统（东濠涌段等）", province: "广东", city: "广州", district: "越秀区/荔湾区/白云区", status: "在建", type: "市政设施", field: "水利设施", overview: "广州市深层隧道排水系统是国内首个针对特大城市老城区合流制溢流污染及内涝问题的系统性解决方案。东濠涌深层排水隧道作为试验段已于2018年建成并投入运行，当前续建工程将深层隧道系统向石井河、驷马涌、景泰涌等其他重点流域延伸。", content: "1. 东濠涌深层隧道上游延伸段：将已建成的东濠涌隧道自东风路向越秀山方向继续向上游延伸。2. 石井河支线深层隧道：沿石井河流域新建深层排水隧道，接纳白云区石井、新市等片区在暴雨期间的合流污水溢流。3. 驷马涌支线深层隧道：在驷马涌流域新建支线隧道，解决老荔湾区逢雨必涝、溢流污染突出的问题。4. 景泰涌及新市涌支线隧道：结合白云新城、广州火车站周边区域城市更新，同步建设景泰涌等流域的深层排水支线。5. 配套预处理及转输设施：在各支线隧道入流处建设竖井、沉砂池和格栅等预处理设施。6. 智慧调度管理系统：建设覆盖全系统的在线监测与远程联控调度平台。", significance: "1. 根治老城区内涝顽疾：广州老城区建筑密集、路面硬化率高，深层隧道利用地下深处空间进行大规模雨污水调蓄，突破了浅层空间不足的瓶颈。2. 消除河涌黑臭，恢复水生态：深层隧道将溢流污水截流并送至污水厂处理，显著减少污染物入河。3. 保障城市水安全韧性：深层隧道为广州中心城区提供了一道战略级地下排涝防线。4. 探索超大城市治水新路径：广州深层隧道排水系统是国内首个在特大城市中心区付诸实施的大型深层排水项目，为国内其他超大城市提供了宝贵的“广州方案”。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "鱼珠隧道", province: "广东", city: "广州", district: "黄埔区/海珠区", status: "在建", type: "过江通道", field: "轨道交通", overview: "鱼珠隧道连接黄埔鱼珠与海珠琶洲，是广州中心城区重要的过江通道，增强珠江两岸交通联系。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "会展西路过江隧道", province: "广东", city: "广州", district: "海珠区/天河区", status: "在建", type: "过江通道", field: "轨道交通", overview: "连接琶洲会展与天河员村，完善琶洲会展区交通配套，缓解琶洲大桥压力。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "如意坊放射线系统工程（含如意坊隧道）", province: "广东", city: "广州", district: "荔湾区", status: "在建", type: "快速路", field: "轨道交通", overview: "如意坊放射线是广州市西南部重要快速通道，含过江隧道，连接内环路与芳村片区。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广佛出口放射线二期（广州段）", province: "广东", city: "广州", district: "荔湾区", status: "在建", type: "快速路", field: "轨道交通", overview: "广佛出口放射线是连接广州与佛山的重要交通干线，二期广州段正在建设。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "广州南站至广州站快速通道", province: "广东", city: "广州", district: "番禺区/海珠区/越秀区", status: "在建", type: "快速路", field: "轨道交通", overview: "连接广州南站与广州站的快速通道（东晓南路—广州南站连接线），强化两大枢纽联系。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "白云机场第二高速南段", province: "广东", city: "广州", district: "白云区/天河区", status: "在建", type: "高速公路", field: "轨道交通", overview: "白云机场第二高速南段连接机场与广州市区，缓解机场高速压力，服务空港经济区。", source: "广州市2026年重点建设项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "沉香大桥", province: "广东", city: "广州", district: "白云区/金沙洲", status: "规划/预备", type: "过江通道", field: "轨道交通", overview: "沉香大桥连接金沙洲与白云区，缓解金沙洲出行难问题，推进前期工作。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "莲花山通道", province: "广东", city: "广州/东莞", district: "番禺区/东莞", status: "规划/预备", type: "过江通道", field: "轨道交通", overview: "莲花山通道连接番禺与东莞，是粤港澳大湾区跨江通道体系的重要组成部分。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "黄埔至南沙东部快速通道", province: "广东", city: "广州", district: "黄埔区/南沙区", status: "规划/预备", type: "快速路", field: "轨道交通", overview: "连接黄埔与南沙的东部快速通道，支撑广州“东进”与“南拓”战略联动。", source: "广州市2026年重点建设预备项目计划", issuer: "广州市发展和改革委员会", source_detail: "广州市发展和改革委员会关于印发广州市2026年重点建设预备项目计划的通知", link: "https://www.gz.gov.cn/attachment/7/7975/7975557/10694627.pdf" },
        { name: "材料基因组和特殊环境材料园区", province: "广东", city: "深圳", district: "光明区", status: "在建", type: "大科学装置", field: "科技设施", overview: "材料基因组和特殊环境材料园区是光明科学城重大科技基础设施集群的重要组成部分，聚焦材料基因组学研究与特殊环境材料研发，建设高通量材料制备与表征平台。", significance: "材料基因组研究通过高通量实验与计算模拟，大幅缩短新材料研发周期、降低研发成本。该设施将推动我国在新材料领域从经验试错向理性设计跨越，支撑高端制造、新能源、电子信息等战略产业发展。", source: "深圳市2026年重大项目计划", issuer: "深圳市发展和改革委员会", source_detail: "深圳市发展和改革委员会关于印发深圳市2026年重大项目计划的通知", link: "https://www.szggzy.com/globalSearch/details.html?contentId=20075200" },
        { name: "深圳中能高重复频率X射线自由电子激光", province: "广东", city: "深圳", district: "光明区", status: "在建", type: "大科学装置", field: "科技设施", overview: "深圳中能高重复频率X射线自由电子激光装置是光明科学城布局的旗舰级重大科技基础设施，能够产生超高亮度、超短脉冲的X射线，为物质科学、生命科学等领域提供前所未有的研究工具。", significance: "自由电子激光装置是探索微观世界的超级显微镜，能在原子和分子尺度上实时观测化学反应、生物过程。该装置的建成将使我国在这一前沿领域跻身国际先进行列，为基础科学突破和高技术研发提供不可替代的平台。", source: "深圳市2026年重大项目计划", issuer: "深圳市发展和改革委员会", source_detail: "深圳市发展和改革委员会关于印发深圳市2026年重大项目计划的通知", link: "https://www.szggzy.com/globalSearch/details.html?contentId=20310485" },
        { name: "深圳中能高重复频率X射线自由电子激光项目一期工程", province: "广东", city: "深圳", district: "光明区", status: "在建", type: "大科学装置", field: "科技设施", overview: "该一期工程是深圳中能高重复频率X射线自由电子激光装置的首期建设内容，主要建设注入器、主加速器及首批实验站，为装置整体运行奠定基础。", significance: "一期工程是整个装置的核心基础，其建设进度直接决定了我国在自由电子激光领域能否尽快形成实验能力。建成后将率先为国内材料科学、生命科学等领域的研究团队提供实验条件。", source: "深圳市2026年重大项目计划", issuer: "深圳市发展和改革委员会", source_detail: "深圳市发展和改革委员会关于印发深圳市2026年重大项目计划的通知", link: "https://www.szggzy.com/globalSearch/details.html?contentId=2041130" },
        { name: "国家超级计算深圳中心（深圳云计算中心）", province: "广东", city: "深圳", district: "南山区", status: "在建", type: "科技平台", field: "科技设施", overview: "国家超级计算深圳中心升级换代工程旨在建设更高性能的超级计算平台，提升计算能力至国际先进水平，支撑科学研究、产业创新和智慧城市建设。", significance: "超级计算中心是科技创新的发动机，广泛应用于气象预报、药物筛选、工业仿真、人工智能训练等领域。升级换代后将大幅提升深圳及粤港澳大湾区的科技基础设施水平。", source: "深圳市2026年重大项目计划", issuer: "深圳市发展和改革委员会", source_detail: "深圳市发展和改革委员会关于印发深圳市2026年重大项目计划的通知", link: "https://www.szggzy.com/globalSearch/details.html?contentId=19953253" },
        { name: "鹏城云脑网络智能重大科技基础设施", province: "广东", city: "深圳", district: "南山区", status: "在建", type: "大科学装置", field: "科技设施", overview: "鹏城云脑是面向人工智能领域的重大科技基础设施，建设大规模智能计算平台，支撑AI基础理论、算法模型、应用技术等前沿研究。", significance: "算力是AI时代的核心生产力。鹏城云脑将为我国AI研究提供世界级的算力支撑，加速通用人工智能、大模型等前沿技术的研发，是抢占AI战略制高点的关键基础设施。", source: "深圳市2026年重大项目计划", issuer: "深圳市发展和改革委员会", source_detail: "深圳市发展和改革委员会关于印发深圳市2026年重大项目计划的通知", link: "" },

    function doSearch() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const fs = document.getElementById('filterStatus').value;
        const ff = document.getElementById('filterField').value;
        const fd = window.selectedDistrict || '';
        if (!keyword && !selectedProvince && !fs && !ff && !fd && !selectedCity) {
            document.getElementById('resultArea').style.display = 'none';
            return;
        }
        let results = projects;
        if (keyword) { results = results.filter(p => fullTextSearch(p, keyword)); }
        if (selectedProvince) results = results.filter(p => fullTextSearch(p, selectedProvince));
        if (selectedCity) results = results.filter(p => fullTextSearch(p, selectedCity));
        if (fd) results = results.filter(p => fullTextSearch(p, fd));
        if (fs) results = results.filter(p => fullTextSearch(p, fs));
        if (ff) results = results.filter(p => fullTextSearch(p, ff));
        displayResults(results);
    }

    function displayResults(results) {
        const ra = document.getElementById('resultArea'), rl = document.getElementById('resultList'), rc = document.getElementById('resultCount');
        if (results.length === 0) {
            ra.style.display = 'block';
            rc.textContent = '0';
            rl.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">未找到匹配的项目，请尝试其他关键词或条件。</p>';
            return;
        }
        ra.style.display = 'block';
        rc.textContent = results.length;
        let html = '';
        results.forEach(p => {
            html += `<div class="result-item"><h3 style="cursor:pointer" onclick="openDetail('${p.name.replace(/'/g, "\\'")}')">${p.name}</h3><div class="meta">${p.province} · ${p.city} · ${p.district} | 状态：<span style="color:${p.status==='在建'?'#2e7d32':'#e65100'}">${p.status}</span> | 类型：${p.type} | 领域：${p.field}</div></div>`;
        });
        rl.innerHTML = html;
    }

    function openDetail(name) {
        const project = projects.find(p => p.name === name);
        if (!project) return;
        const keyword = document.getElementById('searchInput').value.trim();
        let displayName = project.name, displayOverview = project.overview || '', displayContent = project.content || '', displaySignificance = project.significance || '';
        let displayDistrict = project.district || '', displayCity = project.city || '', displayField = project.field || '', displayType = project.type || '', displayStatus = project.status || '', displayProvince = project.province || '';
        if (keyword) {
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            displayName = displayName.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayOverview = displayOverview.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayContent = displayContent.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displaySignificance = displaySignificance.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayDistrict = displayDistrict.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayCity = displayCity.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayField = displayField.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayType = displayType.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayStatus = displayStatus.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
            displayProvince = displayProvince.replace(regex, '<span style="background:#ffe600;color:#333;padding:0 2px;border-radius:2px;">$1</span>');
        }
        let html = `<div class="modal-content"><span class="close-btn" onclick="closeDetail()">&times;</span><div class="detail-title">${displayName}</div><div class="detail-section"><h4>基本信息</h4><p>所属区域：${displayProvince} · ${displayCity} · ${displayDistrict}</p><p>建设状态：${displayStatus} | 项目类型：${displayType} | 领域分类：${displayField}</p></div>`;
        if (displayOverview) html += `<div class="detail-section"><h4>项目概述</h4><p>${displayOverview}</p></div>`;
        if (displayContent) html += `<div class="detail-section"><h4>主要建设内容</h4><p>${displayContent}</p></div>`;
        if (displaySignificance) html += `<div class="detail-section"><h4>建设意义</h4><p>${displaySignificance}</p></div>`;
        html += `<div class="source-section"><h4>权威索引</h4><p>发布机构：${project.issuer||'相关政府部门'}</p><p>来源文件：${project.source}</p><p>原文标题：${project.source_detail||''}</p></div>`;
        if (project.link) html += `<a href="${project.link}" target="_blank" class="official-link">查看政府原文</a>`;
        else html += `<p style="color:#999;">暂无在线原文链接，请查阅相关政府公报。</p>`;
        html += `</div>`;
        const modal = document.createElement('div'); modal.id = 'projectModal'; modal.className = 'modal'; modal.style.display = 'block'; modal.innerHTML = html;
        document.body.appendChild(modal);
    }
    function closeDetail() { const modal = document.getElementById('projectModal'); if (modal) modal.remove(); }

    initRegionPanel();
</script>
